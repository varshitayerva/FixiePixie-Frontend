<div class="container">


  <!-- RIGHT SIDE -->
  <div class="right">
    <mat-card style="background-color:transparent;box-shadow: none;" class="login-card">
      <h2>Login to your account</h2>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password">
      </mat-form-field>

      <!-- <button mat-raised-button color="primary" class="full-width" routerLink="/dashboard">
        Login
      </button> -->

<div class="btn-group">

  <button mat-flat-button class="primary-btn" (click)="loginAsCustomer()">
    Login as Customer
  </button>

  <button mat-stroked-button class="secondary-btn" (click)="loginAsProvider()">
    Login as Provider
  </button>

</div>

      <p class="link">
        New here? <a routerLink="/register">Create account</a>
      </p>
    </mat-card>
  </div>

</div>
