<app-navbar></app-navbar>

<div class="dashboard">

    <h1>Explore Services</h1>
    <p>Choose a service to continue</p>
  </div>

  <!-- CARDS -->
  <div class="card-container">

    <mat-card class="service-card">
      <div class="icon">⚡</div>
      <h3>Electrician</h3>
      <p>Fix wiring, switches, and appliances</p>
      <button class="primary-btn" routerLink="/bookservice">
        Book Service
      </button>
    </mat-card>

    <mat-card class="service-card">
      <div class="icon">🚿</div>
      <h3>Plumber</h3>
      <p>Fix leaks, pipes, and fittings</p>
      <button class="primary-btn" routerLink="/bookservice">
        Book Service
      </button>
    </mat-card>

    <mat-card class="service-card">
      <div class="icon">🧹</div>
      <h3>Cleaning</h3>
      <p>Home & office cleaning services</p>
      <button class="primary-btn" routerLink="/bookservice">
        Book Service
      </button>
    </mat-card>

  </div>

  <!-- QUICK ACTION -->
  <div class="quick-actions">
    <button class="secondary-btn" routerLink="/bookhistory">
      View Bookings
    </button>
  </div>
