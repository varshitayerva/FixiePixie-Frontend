<app-navbar></app-navbar>
<div class="table-card">

  <div class="table-header">
    <h3>All Bookings</h3>
    <span class="count">{{bookings.length}} bookings</span>
  </div>

  <table mat-table [dataSource]="bookings">

    <!-- Service -->
    <ng-container matColumnDef="service">
      <th mat-header-cell *matHeaderCellDef> Service </th>
      <td mat-cell *matCellDef="let b">
        <div class="service-cell">
          <span class="material-icons">build</span>
          {{b.service}}
        </div>
      </td>
    </ng-container>

    <!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Date </th>
      <td mat-cell *matCellDef="let b"> {{b.date}} </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let b">
        <span class="status" [ngClass]="b.status.toLowerCase()">
          {{b.status}}
        </span>
      </td>
    </ng-container>

    <!-- Action -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef> </th>
      <td mat-cell *matCellDef="let b">
        <button class="danger-btn">Cancel</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>

  </table>

</div>
