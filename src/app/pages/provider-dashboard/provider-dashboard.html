<app-navbar></app-navbar>

<div class="dashboard">

  <!-- HEADER -->
  <div class="header">
    <h1>Provider Dashboard</h1>
    <p>Manage your services, bookings and payments</p>
  </div>

  <!-- CARDS -->
  <div class="card-container">

    <mat-card class="card">
      <div class="card-icon">➕</div>
      <h3>Add Service</h3>
      <p>Create and manage your services</p>
      <button class="primary-btn" routerLink="/add-service">
        Add Service
      </button>
    </mat-card>

    <mat-card class="card">
      <div class="card-icon">📋</div>
      <h3>View Requests</h3>
      <p>Check incoming service requests</p>
      <button class="secondary-btn">
        View Requests
      </button>
    </mat-card>

    <mat-card class="card">
      <div class="card-icon">💳</div>
      <h3>Payments</h3>
      <p>Track your earnings and payments</p>
      <button class="secondary-btn">
        View Payments
      </button>
    </mat-card>

  </div>

</div>
